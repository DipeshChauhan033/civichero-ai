version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: civichero_mysql
    restart: always
    environment:
      MYSQL_DATABASE: civichero_db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/database_schema.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: civichero_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/civichero_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - mysql

volumes:
  mysql_data:
